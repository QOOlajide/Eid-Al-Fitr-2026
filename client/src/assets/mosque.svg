  <circle cx="25" cy="20" r="1.5" fill="#ffd700" opacity="0.6"/>
  <circle cx="175" cy="15" r="1.5" fill="#ffd700" opacity="0.6"/>
  <circle cx="15" cy="45" r="1" fill="#ffd700" opacity="0.4"/>
  <circle cx="185" cy="40" r="1" fill="#ffd700" opacity="0.4"/>
